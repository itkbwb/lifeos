name: Bootstrap release keystore

# Manual, one-time job: generates a signing keystore and uploads it as a
# build artifact so it can be pulled down and stored as repo secrets
# (ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS /
# ANDROID_KEY_PASSWORD). Re-running this would invalidate update-in-place
# for anyone who already installed a build signed with the old key.

on:
  workflow_dispatch:
    inputs:
      storepass:
        description: "Keystore/key password (generated by caller, not logged)"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        env:
          STOREPASS: ${{ inputs.storepass }}
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias lifeos \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STOREPASS" \
            -keypass "$STOREPASS" \
            -dname "CN=Life OS, OU=Personal, O=Life OS, L=Seoul, ST=Seoul, C=KR"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore
          retention-days: 1
